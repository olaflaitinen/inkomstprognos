site_name: Inkomstprognos
site_url: https://olaflaitinen.github.io/inkomstprognos
site_description: Probabilistic disposable-income forecasting on Swedish administrative microdata.
site_author: Gustav Olaf Yunus Laitinen-Fredriksson Lundstrom Imanov
repo_url: https://github.com/olaflaitinen/inkomstprognos
repo_name: olaflaitinen/inkomstprognos
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            docstring_style: google
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - tables
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - Home: index.md
  - About: about.md
  - Methodology: methodology.md
  - API Reference: api.md
  - Data: data.md
  - Compliance:
      - EU Compliance: eu-compliance.md
      - Swedish Legal Basis: swedish-legal-basis.md
      - GDPR: gdpr.md
      - DPIA Summary: dpia-summary.md
      - OSOR: osor.md
      - FAIR4RS: fair4rs.md
      - Accessibility: accessibility.md
  - Reproducibility: reproducibility.md
  - Governance: governance.md
  - Citation: citation.md
  - Glossary: glossary.md
  - Deviations: deviations.md
