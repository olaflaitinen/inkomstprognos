codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "90...100"

  status:
    project:
      default:
        target: 90%
        threshold: 1%
    patch:
      default:
        target: 90%

  components:
    ingestion:
      paths:
        - src/inkomstprognos/ingestion/**
    features:
      paths:
        - src/inkomstprognos/features/**
    models:
      paths:
        - src/inkomstprognos/models/**
    pipelines:
      paths:
        - src/inkomstprognos/pipelines/**
    evaluation:
      paths:
        - src/inkomstprognos/evaluation/**
    reporting:
      paths:
        - src/inkomstprognos/reporting/**

ignore:
  - tests/**
  - benchmarks/**
  - scripts/**
  - noxfile.py
